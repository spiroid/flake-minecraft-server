#The amount of recursive block updates that can be caused from opening a single door.
#Default Value: 512
# Default: 512
# Range: 1 ~ 512
double_doors_update_limit = 512
#Can double fence gates open together.
#Default Value: true
open_double_fence_gates_together = true
#Can double trapdoors open together.
#Default Value: true
open_double_trapdoors_together = true
#The amount of recursive block updates that can be caused from opening a single fence gate.
#Default Value: 32
# Default: 32
# Range: 1 ~ 512
double_fence_gates_update_limit = 32
#The amount of recursive block updates that can be caused from opening a single trapdoor.
#Default Value: 32
# Default: 32
# Range: 1 ~ 512
double_trapdoors_update_limit = 32
#Can double doors open together.
#Default Value: true
open_double_doors_together = true
#Use blocks that can be opened from interacting or using redstone together with other blocks of the same kind surrounding them.
#E.g. this allows double doors to be opened together via all means supported by vanilla.
#This option only takes effect in singleplayer and for players on a multiplayer server which does not have this mod installed.
open_all_blocks_together = true
