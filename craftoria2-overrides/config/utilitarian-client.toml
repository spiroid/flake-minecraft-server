#Potions effect stink lines transparency in first person
# Default: 0.2
# Range: 0.0 ~ 1.0
potionEffectTransparency = 0.2
#Recolor hearts instead of stacking them on extra rows when max health exceeds 20.
colorfulHeartsEnabled = true
#Recolor the armor bar to indicate tiers instead of stacking it on extra rows when armor exceeds 20.
overloadedArmorBarEnabled = true
#Recolor hearts in the multiplayer player list (tab list) instead of letting them shrink/overflow when player health exceeds 20.
tabListHeartsEnabled = true
