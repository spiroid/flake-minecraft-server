#Mod Compatibility Settings
[compatibility]
	#Enable Mystical Agriculture compatibility
	enable_mystical_agriculture = true
	#Enable Mystical Agradditions compatibility
	enable_mystical_agradditions = true
	#Enable Farmer's Delight compatibility
	enable_farmers_delight = true
	#Enable Ars Nouveau compatibility
	enable_ars_nouveau = true
	#Enable Ars Elemental compatibility
	enable_ars_elemental = true
	#Enable Silent Gear compatibility
	enable_silent_gear = true
	#Enable Just Dire Things compatibility
	enable_just_dire_things = true
	#Enable Immersive Engineering compatibility
	enable_immersive_engineering = true
	#Enable EvilCraft compatibility
	enable_evilcraft = true
	#Enable Forbidden and Arcanus compatibility
	enable_forbidden_arcanus = true
	#Enable Integrated Dynamics compatibility
	enable_integrated_dynamics = true
	#Enable Occultism compatibility
	enable_occultism = true
	#Enable Pam's HarvestCraft - Crops compatibility
	enable_pams_crops = true
	#Enable Pam's HarvestCraft - Trees compatibility
	enable_pams_trees = true
	#Enable Croptopia compatibility
	enable_croptopia = true
	#Enable Cobblemon compatibility
	enable_cobblemon = true
	#Enable Actually Additions compatibility
	enable_actually_additions = true

#Module Effectiveness Settings
[modules]

	#Speed Module Configuration
	[modules.speed_modules]
		#Speed multiplier for SM-MK1 module
		# Default: 1.1
		# Range: 0.1 ~ 10.0
		mk1_speed_multiplier = 1.1
		#Power consumption multiplier for SM-MK1 module
		# Default: 1.1
		# Range: 0.1 ~ 10.0
		mk1_power_multiplier = 1.1
		#Speed multiplier for SM-MK2 module
		# Default: 1.25
		# Range: 0.1 ~ 10.0
		mk2_speed_multiplier = 1.25
		#Power consumption multiplier for SM-MK2 module
		# Default: 1.25
		# Range: 0.1 ~ 10.0
		mk2_power_multiplier = 1.25
		#Speed multiplier for SM-MK3 module
		# Default: 1.5
		# Range: 0.1 ~ 10.0
		mk3_speed_multiplier = 1.5
		#Power consumption multiplier for SM-MK3 module
		# Default: 1.5
		# Range: 0.1 ~ 10.0
		mk3_power_multiplier = 1.5

	#Yield Module Configuration
	[modules.yield_modules]
		#Yield multiplier for YM-MK1 module
		# Default: 1.1
		# Range: 0.1 ~ 10.0
		mk1_yield_multiplier = 1.1
		#Speed penalty for YM-MK1 module (multiplier)
		# Default: 0.95
		# Range: 0.1 ~ 1.0
		mk1_speed_penalty = 0.95
		#Yield multiplier for YM-MK2 module
		# Default: 1.25
		# Range: 0.1 ~ 10.0
		mk2_yield_multiplier = 1.25
		#Speed penalty for YM-MK2 module (multiplier)
		# Default: 0.85
		# Range: 0.1 ~ 1.0
		mk2_speed_penalty = 0.85
		#Yield multiplier for YM-MK3 module
		# Default: 1.5
		# Range: 0.1 ~ 10.0
		mk3_yield_multiplier = 1.5
		#Speed penalty for YM-MK3 module (multiplier)
		# Default: 0.75
		# Range: 0.1 ~ 1.0
		mk3_speed_penalty = 0.75

